<section class="rounded-lg border border-slate-200 bg-white shadow-sm">
  <div class="flex items-center justify-between border-b border-slate-200 bg-slate-800 px-5 py-4 text-white">
    <h1 class="text-lg font-semibold">Manage Departments</h1>

    <button
      class="rounded-md bg-emerald-600 px-4 py-2 text-sm font-semibold text-white hover:bg-emerald-700"
      type="button"
      (click)="startAdd()"
    >
      Add Department
    </button>
  </div>

  @if (showAddForm) {
    <form class="grid gap-4 border-b border-slate-200 bg-slate-50 p-5 md:grid-cols-2" (ngSubmit)="saveAdd()">
      <input
        class="rounded-md border border-slate-300 px-3 py-2 text-sm text-slate-900 outline-none focus:border-emerald-600 focus:ring-2 focus:ring-emerald-100"
        name="addDepartmentName"
        [(ngModel)]="newDepartment.name"
        placeholder="Department name"
        required
      />

      <div class="flex gap-2">
        <button
          class="flex-1 rounded-md bg-emerald-600 px-3 py-2 text-sm font-semibold text-white hover:bg-emerald-700"
          type="submit"
        >
          Save
        </button>

        <button
          class="flex-1 rounded-md bg-slate-200 px-3 py-2 text-sm font-semibold text-slate-900 hover:bg-slate-300"
          type="button"
          (click)="cancelAdd()"
        >
          Cancel
        </button>
      </div>
    </form>
  }

  @if (editingDepartment) {
    <form class="grid gap-4 border-b border-slate-200 bg-slate-50 p-5 md:grid-cols-2" (ngSubmit)="saveEdit()">
      <input
        class="rounded-md border border-slate-300 px-3 py-2 text-sm text-slate-900 outline-none focus:border-blue-600 focus:ring-2 focus:ring-blue-100"
        name="departmentName"
        [(ngModel)]="editingDepartment.name"
        placeholder="Department name"
        required
      />

      <div class="flex gap-2">
        <button
          class="flex-1 rounded-md bg-blue-600 px-3 py-2 text-sm font-semibold text-white hover:bg-blue-700"
          type="submit"
        >
          Save
        </button>

        <button
          class="flex-1 rounded-md bg-slate-200 px-3 py-2 text-sm font-semibold text-slate-900 hover:bg-slate-300"
          type="button"
          (click)="cancelEdit()"
        >
          Cancel
        </button>
      </div>
    </form>
  }

  <div class="overflow-x-auto">
    <table class="min-w-full divide-y divide-slate-200 text-sm">
      <thead class="bg-slate-50 text-left text-xs font-semibold uppercase tracking-wide text-slate-500">
        <tr>
          <th class="px-5 py-3">Department</th>
          <th class="px-5 py-3">Employees</th>
          <th class="px-5 py-3 text-right">Actions</th>
        </tr>
      </thead>

      <tbody class="divide-y divide-slate-100 bg-white">
        @for (department of departments; track department.id) {
          <tr class="hover:bg-slate-50">
            <td class="px-5 py-4 font-medium text-slate-900">
              {{ department.name }}
            </td>

            <td class="px-5 py-4 text-slate-600">
              {{department.employees?.length}}
            </td>

            <td class="px-5 py-4 text-right">
              <button
                class="mr-2 text-sm font-semibold text-amber-600 hover:text-amber-700"
                (click)="startEdit(department)"
              >
                Edit
              </button>

              <button
                class="text-sm font-semibold text-red-600 hover:text-red-700"
                (click)="deleteDepartment(department.id!)"
              >
                Delete
              </button>
            </td>
          </tr>
        } @empty {
          <tr>
            <td class="px-5 py-6 text-center text-slate-500" colspan="3">
              no departments
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</section>
