<section class="rounded-lg border border-slate-200 bg-white shadow-sm">
  <div class="flex items-center justify-between border-b border-slate-200 bg-slate-800 px-5 py-4 text-white">
    <h1 class="text-lg font-semibold">Manage Departments</h1>

    <button
      class="rounded-md bg-emerald-600 px-4 py-2 text-sm font-semibold text-white hover:bg-emerald-700"
      type="button"
    >
      Add Department
    </button>
  </div>

  <div class="overflow-x-auto">
    <table class="min-w-full divide-y divide-slate-200 text-sm">
      <thead class="bg-slate-50 text-left text-xs font-semibold uppercase tracking-wide text-slate-500">
        <tr>
          <th class="px-5 py-3">Department</th>
          <th class="px-5 py-3">Employees</th>
          <th class="px-5 py-3 text-right">Actions</th>
        </tr>
      </thead>

      <tbody class="divide-y divide-slate-100 bg-white">
        @for (department of departments; track department.id) {
          <tr class="hover:bg-slate-50">
            <td class="px-5 py-4 font-medium text-slate-900">
              {{ department.name }}
            </td>

            <td class="px-5 py-4 text-slate-600">
              {{department.employees?.length}}
            </td>

            <td class="px-5 py-4 text-right">
              <button class="mr-2 text-sm font-semibold text-amber-600 hover:text-amber-700">
                Edit
              </button>

              <button class="text-sm font-semibold text-red-600 hover:text-red-700">
                Delete
              </button>
            </td>
          </tr>
        } @empty {
          <tr>
            <td class="px-5 py-6 text-center text-slate-500" colspan="3">
              no departments
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</section>
