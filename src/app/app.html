@if (isLoggedIn()) {
  <div class="min-h-screen bg-slate-100 text-slate-900">
    <aside class="fixed inset-y-0 left-0 hidden w-64 border-r border-slate-200 bg-white lg:block">
      <div class="border-b border-slate-200 px-6 py-5">
        <h1 class="text-lg font-bold text-slate-950">Company System</h1>
      </div>

      <nav class="space-y-1 px-3 py-4">
        <a routerLink="/" routerLinkActive="bg-blue-50 text-blue-700" [routerLinkActiveOptions]="{ exact: true }"
          class="block rounded-md px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-100">
          Home
        </a>

        <a routerLink="/departments" routerLinkActive="bg-blue-50 text-blue-700"
          class="block rounded-md px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-100">
          Departments
        </a>

        <a routerLink="/employees" routerLinkActive="bg-blue-50 text-blue-700"
          class="block rounded-md px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-100">
          Employees
        </a>
      </nav>
    </aside>

    <div class="lg:pl-64">
      <header class="flex items-center justify-between border-b border-slate-200 bg-white px-6 py-4">
        <!-- <div>
          <h2 class="text-base font-semibold text-slate-950">Dashboard</h2>
          <p class="text-xs text-slate-500">Manage company data</p>
        </div> -->

        <button
          type="button"
          class="rounded-md bg-red-600 px-4 py-2 text-sm font-semibold text-white hover:bg-red-700"
          (click)="logout()"
        >
          Logout
        </button>
      </header>

      <main class="p-6">
        <router-outlet></router-outlet>
      </main>
    </div>

  </div>
} @else {
  <div class="min-h-screen bg-slate-100 px-4 py-10">
    <!-- if the user is not logged in, redirect to login page -->
    <router-outlet></router-outlet>
  </div>
}
