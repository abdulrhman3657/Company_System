<section class="mx-auto max-w-md rounded-lg border border-slate-200 bg-white p-6 shadow-sm">
  <h1 class="mb-6 text-center text-3xl font-semibold text-slate-900">
    {{ mode === 'login' ? 'Login' : 'Register' }}
  </h1>

  <form class="flex flex-col gap-4" (ngSubmit)="submit()">
    <input
      class="rounded-md border border-slate-300 px-3 py-3 text-base text-slate-900 outline-none transition placeholder:text-slate-400 focus:border-blue-600 focus:ring-2 focus:ring-blue-100"
      name="username"
      [(ngModel)]="username"
      placeholder="Username"
    />

    <input
      class="rounded-md border border-slate-300 px-3 py-3 text-base text-slate-900 outline-none transition placeholder:text-slate-400 focus:border-blue-600 focus:ring-2 focus:ring-blue-100"
      name="password"
      [(ngModel)]="password"
      type="password"
      placeholder="Password"
    />

    <button
      class="rounded-md bg-blue-600 px-4 py-3 text-base font-semibold text-white transition hover:bg-blue-700 disabled:cursor-not-allowed disabled:opacity-70"
      type="submit"
      [disabled]="isLoading"
    >
      {{ isLoading ? 'Please wait...' : mode === 'login' ? 'Login' : 'Register' }}
    </button>
  </form>

  <button
    class="mt-3 w-full rounded-md bg-slate-100 px-4 py-3 text-base font-semibold text-slate-900 transition hover:bg-slate-200"
    type="button"
    (click)="mode = mode === 'login' ? 'register' : 'login'"
  >
    Switch to {{ mode === 'login' ? 'Register' : 'Login' }}
  </button>

  @if (message) {
    <p
      class="mt-4 rounded-md border px-3 py-3 text-center font-medium"
      [class.border-emerald-200]="messageType === 'success'"
      [class.bg-emerald-50]="messageType === 'success'"
      [class.text-emerald-800]="messageType === 'success'"
      [class.border-red-200]="messageType === 'error'"
      [class.bg-red-50]="messageType === 'error'"
      [class.text-red-800]="messageType === 'error'"
    >
      {{ message }}
    </p>
  }
</section>
